<VirtualHost *:80>
	ServerAdmin webmaster@localhost
  ServerName  test.localhost
	DocumentRoot /home/psyco/dev/ipark/src/

	<Directory />
		Options FollowSymLinks
		AllowOverride None
	</Directory>

	<Directory /home/psyco/dev/ipark/src/>
	    SetEnv __APP_DIR__      /home/psyco/dev/ipark/src/
	    SetEnv __WAPPCORE_DIR__ /home/psyco/dev/ipark/src/wappcore/

	    Options Indexes FollowSymLinks MultiViews
	    AllowOverride None
	    Order allow,deny
	    allow from all
	</Directory>

  Alias /dev /home/psyco/dev/

	<Directory "/home/psyco/dev/">
	    Options Indexes FollowSymLinks MultiViews
	    AllowOverride None
	    Order allow,deny
	    allow from all
	</Directory>

	ScriptAlias /cgi-bin/ /usr/lib/cgi-bin/
	<Directory "/usr/lib/cgi-bin">
		AllowOverride None
		Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
		Order allow,deny
		Allow from all
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/error.log

	# Possible values include: debug, info, notice, warn, error, crit,
	# alert, emerg.
	LogLevel warn

	CustomLog ${APACHE_LOG_DIR}/access.log combined

    Alias /doc/ "/usr/share/doc/"
    <Directory "/usr/share/doc/">
        Options Indexes MultiViews FollowSymLinks
        AllowOverride None
        Order deny,allow
        Deny from all
        Allow from 127.0.0.0/255.0.0.0 ::1/128
    </Directory>

</VirtualHost>
